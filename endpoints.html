<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="QA Test Lab — API endpoints health monitoring">
  <title>QA Test Lab — Endpoints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="endpoints">
  <div class="app-wrapper">
    <div id="navbar"></div>

    <main class="main">
      <div class="page-header">
        <h1>API Endpoints</h1>
        <p>Health status and latency metrics for monitored API endpoints.</p>
      </div>

      <div class="section-card">
        <div id="endpoint-list"></div>
      </div>
    </main>

    <div id="footer"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (function() {
      const endpoints = DataStore.getEndpoints();
      const container = document.getElementById('endpoint-list');
      container.innerHTML = endpoints.map(e => `
        <div class="endpoint-item">
          <div class="endpoint-info">
            <span class="endpoint-method ${e.method.toLowerCase()}">${e.method}</span>
            <span class="endpoint-path">${e.path}</span>
          </div>
          <div class="endpoint-stats">
            <span class="badge ${e.status}"><span class="badge-dot ${e.status}"></span>${e.status}</span>
            <span>${e.latency}</span>
            <span style="color:var(--silver-dim)">${e.lastCheck}</span>
          </div>
        </div>
      `).join('');
    })();
  </script>
</body>
</html>
