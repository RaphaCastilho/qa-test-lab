<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Playwright QA Lab — Test scenarios catalog">
  <title>Playwright QA Lab — Scenarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="scenarios">
  <div class="app-wrapper">
    <div id="navbar"></div>

    <main class="main">
      <div class="page-header">
        <h1>Test Scenarios</h1>
        <p>Catalog of automated E2E scenarios organized by suite and priority.</p>
      </div>

      <div class="filter-bar">
        <input type="text" class="filter-input" id="search-input" placeholder="Search scenarios by name or ID..." aria-label="Search scenarios">
        <select class="filter-select" id="status-filter" aria-label="Filter by status">
          <option value="all">All status</option>
          <option value="passed">Passed</option>
          <option value="failed">Failed</option>
          <option value="skipped">Skipped</option>
        </select>
        <select class="filter-select" id="suite-filter" aria-label="Filter by suite">
          <option value="all">All suites</option>
          <option value="Auth">Auth</option>
          <option value="Catalog">Catalog</option>
          <option value="Cart">Cart</option>
          <option value="Checkout">Checkout</option>
          <option value="Payment">Payment</option>
          <option value="Profile">Profile</option>
          <option value="Realtime">Realtime</option>
          <option value="Resilience">Resilience</option>
          <option value="UI">UI</option>
          <option value="Accessibility">Accessibility</option>
          <option value="Reports">Reports</option>
        </select>
      </div>

      <div class="scenario-grid" id="scenario-grid"></div>
    </main>

    <div id="footer"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (function() {
      let scenarios = DataStore.getScenarios();

      function render() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const statusVal = document.getElementById('status-filter').value;
        const suiteVal = document.getElementById('suite-filter').value;

        const filtered = scenarios.filter(s => {
          const matchSearch = s.title.toLowerCase().includes(searchTerm) || s.id.toLowerCase().includes(searchTerm);
          const matchStatus = statusVal === 'all' || s.status === statusVal;
          const matchSuite = suiteVal === 'all' || s.suite === suiteVal;
          return matchSearch && matchStatus && matchSuite;
        });

        const grid = document.getElementById('scenario-grid');
        if (filtered.length === 0) {
          grid.innerHTML = '<p style="color: var(--silver-dim); grid-column: 1 / -1; text-align: center; padding: 48px 0;">No scenarios match the current filters.</p>';
          return;
        }
        grid.innerHTML = filtered.map(s => `
          <div class="scenario-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
              <span class="badge ${s.status}"><span class="badge-dot ${s.status}"></span>${s.status}</span>
              <span style="font-size:.7rem;color:var(--silver-dim);font-weight:500;">${s.id}</span>
            </div>
            <h3>${s.title}</h3>
            <p>${s.desc}</p>
            <div class="scenario-meta">
              <span>Suite: <strong>${s.suite}</strong></span>
              <span>Priority: <strong>${s.priority}</strong></span>
            </div>
          </div>
        `).join('');
      }

      document.getElementById('search-input').addEventListener('input', render);
      document.getElementById('status-filter').addEventListener('change', render);
      document.getElementById('suite-filter').addEventListener('change', render);
      render();
    })();
  </script>
</body>
</html>
