<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Playwright QA Lab — Manual and automated test cases catalog">
  <title>Playwright QA Lab — Test Cases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="test-cases">
  <div class="app-wrapper">
    <div id="navbar"></div>

    <main class="main">
      <div class="page-header">
        <h1>Test Cases</h1>
        <p>Detailed manual test cases with preconditions, execution steps, and expected results.</p>
      </div>

      <div class="filter-bar">
        <input type="text" class="filter-input" id="search-input" placeholder="Search by ID or title..." aria-label="Search test cases">
        <select class="filter-select" id="status-filter" aria-label="Filter by status">
          <option value="all">All status</option>
          <option value="passed">Passed</option>
          <option value="failed">Failed</option>
          <option value="skipped">Skipped</option>
        </select>
        <select class="filter-select" id="priority-filter" aria-label="Filter by priority">
          <option value="all">All priorities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="filter-select" id="suite-filter" aria-label="Filter by suite">
          <option value="all">All suites</option>
          <option value="Auth">Auth</option>
          <option value="Catalog">Catalog</option>
          <option value="Cart">Cart</option>
          <option value="Checkout">Checkout</option>
          <option value="Payment">Payment</option>
          <option value="Profile">Profile</option>
          <option value="Reports">Reports</option>
        </select>
      </div>

      <div class="tc-grid" id="tc-grid"></div>
    </main>

    <div id="footer"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (function() {
      let testCases = DataStore.getTestCases();

      function render() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const statusVal = document.getElementById('status-filter').value;
        const priorityVal = document.getElementById('priority-filter').value;
        const suiteVal = document.getElementById('suite-filter').value;

        const filtered = testCases.filter(tc => {
          const matchSearch = tc.id.toLowerCase().includes(searchTerm) || tc.title.toLowerCase().includes(searchTerm);
          const matchStatus = statusVal === 'all' || tc.status === statusVal;
          const matchPriority = priorityVal === 'all' || tc.priority === priorityVal;
          const matchSuite = suiteVal === 'all' || tc.suite === suiteVal;
          return matchSearch && matchStatus && matchPriority && matchSuite;
        });

        const grid = document.getElementById('tc-grid');
        if (filtered.length === 0) {
          grid.innerHTML = '<p style="color: var(--silver-dim); grid-column: 1 / -1; text-align: center; padding: 48px 0;">No test cases match the current filters.</p>';
          return;
        }
        grid.innerHTML = filtered.map(tc => `
          <div class="tc-card">
            <div class="tc-head">
              <span class="badge ${tc.status}"><span class="badge-dot ${tc.status}"></span>${tc.status}</span>
              <span class="tc-id">${tc.id}</span>
            </div>
            <h3 class="tc-title">${tc.title}</h3>
            <p class="tc-desc">${tc.description}</p>
            ${tc.preconditions.length ? `
            <div class="tc-section">
              <strong>Preconditions</strong>
              <ul>${tc.preconditions.map(p => `<li>${p}</li>`).join('')}</ul>
            </div>` : ''}
            <div class="tc-section">
              <strong>Steps</strong>
              <ol>${tc.steps.map(s => `<li>${s}</li>`).join('')}</ol>
            </div>
            <div class="tc-section">
              <strong class="tc-label-expected">Expected Result</strong>
              <p class="tc-expected">${tc.expectedResult}</p>
            </div>
            <div class="tc-meta">
              <span>Suite: <strong>${tc.suite}</strong></span>
              <span>Priority: <strong>${tc.priority}</strong></span>
            </div>
          </div>
        `).join('');
      }

      document.getElementById('search-input').addEventListener('input', render);
      document.getElementById('status-filter').addEventListener('change', render);
      document.getElementById('priority-filter').addEventListener('change', render);
      document.getElementById('suite-filter').addEventListener('change', render);
      render();
    })();
  </script>
</body>
</html>
